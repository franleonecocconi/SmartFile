<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SmartFile Upload</title>

    <link rel="stylesheet" href="upload.css">
</head>
<body>

    <!-- CONTENEDOR -->

    <div id="uploadContainer">

        <!-- TOP -->

        <div id="topBar">

            <div>

                <h1>
                    Zip de SmartFile
                </h1>

                <p id="zipSize">
                    0 MB
                </p>

            </div>

            <button id="sendButton">
                Enviar
            </button>

        </div>

        <!-- BARRA -->

        <div id="progressArea">

            <div id="progressBar"></div>

        </div>

        <!-- PORTADAS -->

        <div id="previewGrid"></div>

    </div>

    <!-- MENU -->

    <div id="shareMenu">

        <div id="shareBox">

            <!-- IZQUIERDA -->

            <div id="leftSide">

                <img
                    src="qr.png"
                    id="qrImage"
                >

            </div>

            <!-- DERECHA -->

            <div id="rightSide">

                <img src="close.png">
                    id="closeButton"
                >

                <h2>
                    Zip de SmartFile
                </h2>

                <p id="menuSize">
                    0 MB
                </p>

                <h3>
                    Copiar URL
                </h3>

                <p id="copyText">
                    Copia la URL y compartela con quien quieras
                </p>

                <!-- URL -->

                <div id="urlBox">

                    <input
                        type="text"
                        id="urlInput"
                        readonly
                    >

                    <img src="assets/copy.png">
                        id="copyButton"
                    >

                </div>

                <!-- DEVICES -->

                <h3 id="nearbyTitle">
                    Nearby Devices
                </h3>

                <div id="devicesList"></div>

            </div>

        </div>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="upload.js"></script>

</body>
</html>
